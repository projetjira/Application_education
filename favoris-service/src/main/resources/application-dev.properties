# Development environment configuration
spring.application.name=favoris-service
debug=true

# Configuration du serveur
server.port=9090

# Minimal MongoDB Atlas settings
spring.data.mongodb.database=favoris_db
spring.data.mongodb.auto-index-creation=true

# Simplified connection string with minimal options
spring.data.mongodb.uri=mongodb+srv://ameramour2004:daligh15@cluster0.qxlfel8.mongodb.net/favoris_db?retryWrites=true&sslEnabled=true&sslInvalidHostNameAllowed=true

# Increase timeouts
spring.data.mongodb.socket-timeout=60000
spring.data.mongodb.connection-timeout=60000
spring.data.mongodb.max-wait-time=60000
spring.data.mongodb.server-selection-timeout=60000

# Configuration cache en mémoire au lieu de Redis
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

# Désactiver Redis 
spring.data.redis.enabled=false

# Logging for MongoDB operations in dev
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.formations.favoris=DEBUG
