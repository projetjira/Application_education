spring.application.name=favoris-service
debug=true

# Configuration du serveur
server.port=9090

# Swagger UI / OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
# Don't set syntax highlight as it requires specific enum values

# MongoDB Configuration - CONNECTION TO ATLAS
# Simple connection string without extra parameters that might cause compatibility issues
spring.data.mongodb.uri=mongodb+srv://ameramour2004:daligh15@cluster0.qxlfel8.mongodb.net/favoris_db
# Explicitly set database name
spring.data.mongodb.database=favoris_db
# Authentication database for MongoDB
spring.data.mongodb.authentication-database=admin

# MongoDB options for stability
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connection-timeout=30000
spring.data.mongodb.socket-timeout=60000
spring.data.mongodb.max-wait-time=30000
spring.data.mongodb.max-connection-idle-time=60000
spring.data.mongodb.max-connection-life-time=300000

# MongoDB options for error and disconnection handling
spring.data.mongodb.retry-writes=true
spring.data.mongodb.retry-reads=true
spring.data.mongodb.server-selection-timeout=15000
spring.data.mongodb.heartbeat-frequency=10000

# Enable MongoDB repositories
spring.data.mongodb.repositories.enabled=true

# Disable embedded MongoDB to avoid dependency issues
spring.autoconfigure.exclude=de.flapdoodle.embed.mongo.spring.autoconfigure.EmbeddedMongoAutoConfiguration

# SSL Trust Store settings for MongoDB
# These help resolve SSL handshake issues
javax.net.ssl.trustStore=#{systemProperties['java.home']}/lib/security/cacerts
javax.net.ssl.trustStorePassword=changeit

# Configuration Redis (set to optional)
spring.data.redis.repositories.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=10000
spring.data.redis.client-name=favoris-service

# Make Redis connection attempts non-blocking
spring.redis.connect-failure-mode=continue

# Configuration de la résilience Redis
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms
spring.data.redis.lettuce.pool.shutdown-timeout=1000ms

# Configuration du cache - use simple cache if Redis is unavailable
spring.cache.type=simple
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=favoris: